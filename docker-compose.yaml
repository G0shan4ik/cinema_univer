services:
  postgres:
    image: postgres:16-alpine
    container_name: cinema-postgres
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cinema"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./cinema2_0
    container_name: cinema-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: cinema
      DEBUG: "False"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: cinema-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
